name: Deploy Azure Stack

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: Azure subscription ID
        required: false
        type: string
      resource_group:
        description: Azure resource group name
        required: false
        type: string
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}-${{ inputs.resource_group || vars.AZURE_RESOURCE_GROUP || vars.RESOURCE_GROUP || 'unset-rg' }}
  cancel-in-progress: false

env:
  PROJECT_NAME: qualsdemo
  DEFAULT_AZURE_LOCATION: centralus

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      location: ${{ steps.prepare.outputs.location }}
      parameter_file: ${{ steps.prepare.outputs.parameter_file }}
    steps:
      - name: Resolve deployment settings
        id: prepare
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_RESOURCE_GROUP: ${{ inputs.resource_group }}
          INPUT_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          DEFAULT_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}
          LEGACY_RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || secrets.RESOURCE_GROUP }}
          DEFAULT_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          deploy_environment="$INPUT_ENVIRONMENT"
          resource_group="$INPUT_RESOURCE_GROUP"
          subscription_id="$INPUT_SUBSCRIPTION_ID"

          if [ -z "$resource_group" ]; then
            resource_group="${DEFAULT_RESOURCE_GROUP:-$LEGACY_RESOURCE_GROUP}"
          fi

          if [ -z "$subscription_id" ]; then
            subscription_id="$DEFAULT_SUBSCRIPTION_ID"
          fi

          if [ -z "$subscription_id" ] && [ -n "$AZURE_CREDENTIALS" ]; then
            subscription_id=$(printf '%s' "$AZURE_CREDENTIALS" | jq -r '.subscriptionId // empty')
          fi

          if [ -z "$resource_group" ]; then
            echo "Missing deployment resource group. Provide the workflow input or set repository variable AZURE_RESOURCE_GROUP or RESOURCE_GROUP." >&2
            exit 1
          fi

          if [ -z "$subscription_id" ]; then
            echo "Missing deployment subscription ID. Provide the workflow input or set repository variable AZURE_SUBSCRIPTION_ID." >&2
            exit 1
          fi

          location="$DEFAULT_AZURE_LOCATION"

          echo "location=$location" >> "$GITHUB_OUTPUT"
          echo "parameter_file=infra/environments/$deploy_environment.bicepparam" >> "$GITHUB_OUTPUT"

  infra:
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      DEPLOY_RESOURCE_GROUP: ${{ inputs.resource_group || vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP || vars.RESOURCE_GROUP || secrets.RESOURCE_GROUP }}
      DEPLOY_SUBSCRIPTION_ID: ${{ inputs.subscription_id || vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID || fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
    outputs:
      web_app_name: ${{ steps.capture.outputs.web_app_name }}
      web_app_host_name: ${{ steps.capture.outputs.web_app_host_name }}
      key_vault_name: ${{ steps.capture.outputs.key_vault_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate deployment configuration
        env:
          AZURE_SUBSCRIPTION_ID: ${{ env.DEPLOY_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ env.DEPLOY_RESOURCE_GROUP }}
        run: |
          required=(AZURE_RESOURCE_GROUP)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required repository configuration value: $name" >&2
              exit 1
            fi
          done

          if [ -n "$AZURE_CREDENTIALS" ]; then
            client_id=$(printf '%s' "$AZURE_CREDENTIALS" | jq -r '.clientId // empty')
            client_secret=$(printf '%s' "$AZURE_CREDENTIALS" | jq -r '.clientSecret // empty')
            tenant_id=$(printf '%s' "$AZURE_CREDENTIALS" | jq -r '.tenantId // empty')
            subscription_id=$(printf '%s' "$AZURE_CREDENTIALS" | jq -r '.subscriptionId // empty')

            if [ -z "$client_id" ] || [ -z "$client_secret" ] || [ -z "$tenant_id" ] || [ -z "$subscription_id" ]; then
              echo "AZURE_CREDENTIALS must be a JSON object containing clientId, clientSecret, tenantId, and subscriptionId." >&2
              exit 1
            fi
            exit 0
          fi

          if [ -n "$AZURE_CLIENT_SECRET" ]; then
            if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ]; then
              echo "AZURE_CLIENT_SECRET requires AZURE_CLIENT_ID and AZURE_TENANT_ID." >&2
              exit 1
            fi
            exit 0
          fi

          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ]; then
            echo "Provide either repository secret AZURE_CREDENTIALS, repository secret AZURE_CLIENT_SECRET with AZURE_CLIENT_ID and AZURE_TENANT_ID, or repository-level OIDC settings AZURE_CLIENT_ID and AZURE_TENANT_ID." >&2
            exit 1
          fi

          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "Missing required repository configuration value: AZURE_SUBSCRIPTION_ID" >&2
            exit 1
          fi

      - name: Azure login with secret credentials
        if: env.AZURE_CREDENTIALS != ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Azure login with client secret
        if: env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET != ''
        uses: azure/login@v2
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","tenantId":"{2}","subscriptionId":"{3}"}}', env.AZURE_CLIENT_ID, env.AZURE_CLIENT_SECRET, env.AZURE_TENANT_ID, env.DEPLOY_SUBSCRIPTION_ID) }}
          enable-AzPSSession: false

      - name: Azure login with OIDC
        if: env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET == ''
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.DEPLOY_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --location "${{ needs.prepare.outputs.location }}"

      - name: Register Azure resource providers
        run: |
          providers=(Microsoft.Web Microsoft.KeyVault Microsoft.Insights Microsoft.CognitiveServices)

          for provider in "${providers[@]}"; do
            state=$(az provider show --namespace "$provider" --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")

            if [ "$state" != "Registered" ]; then
              if ! register_output=$(az provider register --namespace "$provider" 2>&1); then
                echo "$register_output" >&2
                echo "Unable to register Azure resource provider $provider. Register it once at the subscription level with an Owner or Contributor plus /register/action permission, then rerun this workflow." >&2
                exit 1
              fi

              for attempt in {1..30}; do
                state=$(az provider show --namespace "$provider" --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")

                if [ "$state" = "Registered" ]; then
                  break
                fi

                if [ "$attempt" -eq 30 ]; then
                  echo "Azure resource provider $provider did not reach Registered state in time. Confirm subscription-level registration, then rerun this workflow." >&2
                  exit 1
                fi

                sleep 10
              done
            fi
          done

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep

      - name: Preview infrastructure changes
        run: |
          az deployment group what-if \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters "${{ needs.prepare.outputs.parameter_file }}"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --name "deploy-${{ github.run_id }}" \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters "${{ needs.prepare.outputs.parameter_file }}"

      - name: Capture infrastructure outputs
        id: capture
        run: |
          web_app_name=$(az deployment group show \
            --name "deploy-${{ github.run_id }}" \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --query properties.outputs.webAppName.value -o tsv)
          web_app_host_name=$(az deployment group show \
            --name "deploy-${{ github.run_id }}" \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --query properties.outputs.webAppHostName.value -o tsv)
          key_vault_name=$(az deployment group show \
            --name "deploy-${{ github.run_id }}" \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --query properties.outputs.keyVaultName.value -o tsv)

          echo "web_app_name=$web_app_name" >> "$GITHUB_OUTPUT"
          echo "web_app_host_name=$web_app_host_name" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$key_vault_name" >> "$GITHUB_OUTPUT"

  app:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - infra
    timeout-minutes: 30
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      DEPLOY_RESOURCE_GROUP: ${{ inputs.resource_group || vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP || vars.RESOURCE_GROUP || secrets.RESOURCE_GROUP }}
      DEPLOY_SUBSCRIPTION_ID: ${{ inputs.subscription_id || vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID || fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Azure login with secret credentials
        if: env.AZURE_CREDENTIALS != ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Azure login with client secret
        if: env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET != ''
        uses: azure/login@v2
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","tenantId":"{2}","subscriptionId":"{3}"}}', env.AZURE_CLIENT_ID, env.AZURE_CLIENT_SECRET, env.AZURE_TENANT_ID, env.DEPLOY_SUBSCRIPTION_ID) }}
          enable-AzPSSession: false

      - name: Azure login with OIDC
        if: env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET == ''
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.DEPLOY_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Configure package deployment mode
        run: |
          az webapp config appsettings set \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --name "${{ needs.infra.outputs.web_app_name }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1

      - name: Package application
        run: |
          deploy_dir="$RUNNER_TEMP/qualsdemo-package"
          rm -rf "$deploy_dir"
          mkdir -p "$deploy_dir"
          git archive HEAD | tar -x -C "$deploy_dir"

          cd "$deploy_dir"
          npm ci --omit=dev
          mkdir -p server/data server/uploads
          zip -qr "$RUNNER_TEMP/qualsdemo.zip" .

      - name: Deploy application package
        run: |
          for attempt in $(seq 1 3); do
            if az webapp deploy \
              --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
              --name "${{ needs.infra.outputs.web_app_name }}" \
              --src-path "$RUNNER_TEMP/qualsdemo.zip" \
              --track-status false \
              --type zip; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Deployment failed after $attempt attempts." >&2
              exit 1
            fi

            echo "Deploy attempt $attempt failed. Restarting web app before retrying." >&2
            az webapp restart \
              --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
              --name "${{ needs.infra.outputs.web_app_name }}"
            sleep 30
          done

      - name: Capture latest deployment logs on failure
        if: failure()
        continue-on-error: true
        run: |
          az webapp log deployment show \
            --resource-group "${{ env.DEPLOY_RESOURCE_GROUP }}" \
            --name "${{ needs.infra.outputs.web_app_name }}"

      - name: Smoke test health endpoint
        run: |
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error "https://${{ needs.infra.outputs.web_app_host_name }}/api/v1/health"; then
              exit 0
            fi
            sleep 15
          done
          echo "Health endpoint did not become ready in time." >&2
          exit 1

      - name: Smoke test AI status endpoint
        run: |
          curl --fail --silent --show-error "https://${{ needs.infra.outputs.web_app_host_name }}/api/v1/ai-status"
